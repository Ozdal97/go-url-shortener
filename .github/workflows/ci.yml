name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  layout:
    name: project layout
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
      - name: required files
        run: |
          set -e
          test -f go.mod
          test -f cmd/server/main.go
          test -d internal/config
          test -d internal/http
          test -d internal/repository
          test -d internal/service
          echo "layout OK"
      - name: parse go sources
        run: go run ./_ci/parsecheck
